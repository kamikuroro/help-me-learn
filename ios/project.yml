name: HelpMeLearn
options:
  bundleIdPrefix: com.helpmelearn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  HelpMeLearn:
    type: application
    platform: iOS
    sources:
      - HelpMeLearn
    settings:
      base:
        INFOPLIST_FILE: HelpMeLearn/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.helpmelearn.app
    dependencies:
      - target: ShareExtension
    entitlements:
      path: HelpMeLearn/HelpMeLearn.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.helpmelearn.shared

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.helpmelearn.app.share
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.helpmelearn.shared

schemes:
  HelpMeLearn:
    build:
      targets:
        HelpMeLearn: all
        ShareExtension: all
    run:
      config: Debug
